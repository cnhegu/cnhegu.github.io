# .github/workflows/deploy.yml

name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main # 确保这是你的主分支名
  workflow_dispatch:

# 关键：为工作流设置权限，使其可以部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 设置并发控制，确保每次只有一个部署在运行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      # 第 1 步：检出你的仓库代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 第 2 步：安装最新版的 Hugo (Extended 版本)
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # 第 2.5 步：为 go/git 模块下载配置凭据（支持 GITHUB_TOKEN 或 自定义 PAT 存在时使用）
      # 保留此步骤以便在将来需要私有模块时使用；如果你直接把主题放到 themes/ 中，下面不再需要 hugo mod get
      - name: Configure credentials for downloading Hugo modules
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODULES_PAT: ${{ secrets.MODULES_PAT }} # 可选：如果你需要跨账号访问私有仓库，可建一个 PAT 存为 MODULES_PAT
        run: |
          set -e
          # 如果仓库设置了 MODULES_PAT（个人访问令牌），优先使用它
          if [ -n "$MODULES_PAT" ]; then
            printf "machine github.com\nlogin x-access-token\npassword %s\n" "$MODULES_PAT" > ~/.netrc
            git config --global url."https://x-access-token:${MODULES_PAT}@github.com/".insteadOf "https://github.com/"
          else
            # 否则尝试使用内置 GITHUB_TOKEN（仅在同账号/有权限的私有仓库可用）
            printf "machine github.com\nlogin %s\npassword %s\n" "$GITHUB_ACTOR" "$GITHUB_TOKEN" > ~/.netrc
            git config --global url."https://$GITHUB_ACTOR:$GITHUB_TOKEN@github.com/".insteadOf "https://github.com/"
          fi
          chmod 600 ~/.netrc

      # 注意：已移除 “Update Hugo Modules (hugo mod get -u)” 步骤
      # 因为你要把主题直接包含到站点 (themes/)，不再通过 Hugo modules 下载主题。

      # 第 4 步：执行 Hugo 构建，并强制忽略缓存
      - name: Build with Hugo
        run: hugo --minify --ignoreCache

      # 第 5 步：配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 第 6 步：将构建好的网站 (public 目录) 打包成构件
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # 第 7 步：从构件部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
