# .github/workflows/deploy.yml

name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main # 确保这是你的主分支名
  workflow_dispatch:

# 关键：为工作流设置权限，使其可以部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 设置并发控制，确保每次只有一个部署在运行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 构建任务
  build:
    runs-on: ubuntu-latest
    steps:
      # 第 1 步：检出你的仓库代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 第 2 步：安装最新版的 Hugo (Extended 版本)
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # 第 2.5 步：为 go/git 模块下载配置凭据
      - name: Configure credentials for downloading Hugo modules
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODULES_PAT: ${{ secrets.MODULES_PAT }}
        run: |
          set -e
          if [ -n "$MODULES_PAT" ]; then
            printf "machine github.com\nlogin x-access-token\npassword %s\n" "$MODULES_PAT" > ~/.netrc
            git config --global url."https://x-access-token:${MODULES_PAT}@github.com/".insteadOf "https://github.com/"
          else
            printf "machine github.com\nlogin %s\npassword %s\n" "$GITHUB_ACTOR" "$GITHUB_TOKEN" > ~/.netrc
            git config --global url."https://$GITHUB_ACTOR:$GITHUB_TOKEN@github.com/".insteadOf "https://github.com/"
          fi
          chmod 600 ~/.netrc

      # 第 3 步：在构建时把主题仓库检出到 themes/ 目录
      - name: Checkout theme repository into themes/
        uses: actions/checkout@v4
        with:
          repository: reuixiy/hugo-theme-meme
          path: themes/hugo-theme-meme
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      # 移除主题中的 .git 以避免嵌套 git 仓库问题
      - name: Remove theme .git directory
        run: |
          if [ -d "themes/hugo-theme-meme/.git" ]; then
            rm -rf themes/hugo-theme-meme/.git
          fi

      # ==========================================
      # 新增步骤：缓存 Hugo 资源文件 (resources) 加快构建速度
      # ==========================================
      - name: Cache Hugo resources
        uses: actions/cache@v3
        with:
          path: resources
          key: ${{ runner.os }}-hugo-resources-${{ hashFiles('content/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-resources-

      # 第 4 步：执行 Hugo 构建
      # 已移除 --ignoreCache 参数，以确保缓存生效
      - name: Build with Hugo
        run: hugo --minify

      # 第 5 步：配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 第 6 步：将构建好的网站 (public 目录) 打包成构件
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # 第 7 步：从构件部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4