name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches:
      - main # 确保这是你的主分支名
  workflow_dispatch:

# 为工作流设置权限，使其可以部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 设置并发控制，确保每次只有一个部署在运行
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 构建任务（改回云端 Ubuntu 执行，速度极快且不会出错）
  build:
    runs-on: ubuntu-latest
    steps:
      # 第 1 步：检出你的仓库代码
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 第 2 步：安装最新版的 Hugo (Extended 版本)
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # 第 3 步：直接克隆主题（精简了复杂的凭据验证，直接用官方 Action 检出）
      - name: Checkout theme repository into themes/
        uses: actions/checkout@v4
        with:
          repository: reuixiy/hugo-theme-meme
          path: themes/hugo-theme-meme
          fetch-depth: 1

      # 移除主题中的 .git 以避免嵌套 git 仓库问题
      - name: Remove theme .git directory
        run: rm -rf themes/hugo-theme-meme/.git

      # 第 4 步：缓存 Hugo 资源文件 (resources) 加快构建速度
      - name: Cache Hugo resources
        uses: actions/cache@v3
        with:
          path: resources
          key: ${{ runner.os }}-hugo-resources-${{ hashFiles('content/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-resources-

      # 第 5 步：执行 Hugo 构建
      - name: Build with Hugo
        run: hugo --minify

      # 第 6 步：配置 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 第 7 步：将构建好的网站打包成构件
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  # 部署任务
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      # 第 8 步：从构件部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4