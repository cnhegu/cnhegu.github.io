# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.
#
# If you need help with YAML syntax, here are some quick references for you:
# https://learn-the-web.algonquindesign.ca/topics/markdown-yaml-cheat-sheet/#yaml
# https://learnxinyminutes.com/docs/yaml/
#
# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.


title: 何故小站 #不在页脚显示
author: 何故

email: comitist@gmail.com
description: ©2025 hegu.me All rights reserved.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://www.hegu.me" # the base hostname & protocol for your site, e.g. http://example.com
twitter_username: NullCause
github_username: cnhegu
facebook_username: xchegu


# Build settings
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-paginate

# - jekyll-gist # 如果您启用了，这里会有
# Google Analytics 4 (GA4) 配置 - 添加或修改这一行
google_analytics: G-4BMXNHL73E # <-- 把这里替换成您的实际衡量 ID，例如 G-ABCDEF1234
future: true
paginate: 5 # 每页显示的文章数量
paginate_path: "/page:num/" # 分页链接的路径结构，:num 会被页码替换

# --- Sass 配置开始 ---
# 这部分是关键，告诉 Jekyll 如何处理 Sass 文件
sass:
  style: compressed
  load_paths:
    - _sass
    - _sass/minima # 确保这一行也存在
# --- Sass 配置结束 ---

# --- Minima 主题自定义颜色变量开始 ---
# 这部分是 Minima 主题特有的自定义方式
# 它会覆盖 Minima 内部 _variables.scss 中带有 !default 标记的同名变量
minima:
  colors:
    text_color: "#c9d1d9"        # 主要文字颜色改为浅灰色
    background_color: "#0d1117"  # 全局背景色改为类似 GitHub 的深蓝色
    brand_color: "#2a7ae2"      # 品牌色（用于链接等），保持不变
    grey_color: "#8b949e"
    grey_color_light: "#21262d"
    grey_color_dark: "#010409"
  # Minima 主题的字体变量通常直接在 _sass/minima/_variables.scss 中定义
  # 如果你想通过 _config.yml 覆盖，需要 Minima 内部支持。
  # 否则，请通过 _sass/_variables.scss 来覆盖 $body-font-family。
# --- Minima 主题自定义颜色变量结束 ---


